name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    # Skip if commit message contains [skip ci] or [skip release]
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') && !contains(github.event.head_commit.message, '[skip ci]') }}

    permissions:
      contents: write
      packages: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Build all packages
        run: pnpm build

      # Changeset 发布流程
      - name: Check for changesets
        id: changesets
        run: |
          CHANGESET_FILES=$(find .changeset -name "*.md" ! -name "README.md" 2>/dev/null | wc -l | tr -d ' ')
          echo "count=$CHANGESET_FILES" >> $GITHUB_OUTPUT
          if [[ "$CHANGESET_FILES" -gt 0 ]]; then
            echo "has_changesets=true" >> $GITHUB_OUTPUT
            echo "发现 $CHANGESET_FILES 个 changeset 文件"
          else
            echo "has_changesets=false" >> $GITHUB_OUTPUT
            echo "没有待发布的 changesets，跳过发布"
          fi

      - name: Version packages
        if: steps.changesets.outputs.has_changesets == 'true'
        run: pnpm changeset version

      - name: Commit version updates
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          git add -A
          git commit -m "chore(release): version packages [skip ci]" || echo "没有需要提交的更改"

      - name: Publish to npm
        if: steps.changesets.outputs.has_changesets == 'true'
        run: pnpm changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push changes and tags
        if: steps.changesets.outputs.has_changesets == 'true'
        run: git push origin main --follow-tags

      - name: Summary
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ Changeset release completed" >> $GITHUB_STEP_SUMMARY
          echo "📦 Packages published to npm" >> $GITHUB_STEP_SUMMARY
          echo "🏷️ Git tags created and pushed" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 Release failed for commit ${context.sha.substring(0, 7)}`,
                body: `The release workflow failed.\n\n**Workflow run:** ${context.payload.repository.html_url}/actions/runs/${context.runId}\n**Commit:** ${context.payload.head_commit?.message || 'N/A'}\n\nPlease check the workflow logs and retry manually.`,
                labels: ['release', 'bug']
              });
            } catch (error) {
              console.error('Failed to create issue:', error.message);
            }